name: test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Register checkout as the tap
        run: |
          tap_dir="$(brew --repository)/Library/Taps/zubeidhendricks/homebrew-toad"
          mkdir -p "$(dirname "$tap_dir")"
          ln -s "$GITHUB_WORKSPACE" "$tap_dir"

      - name: Style
        run: brew style zubeidhendricks/toad

      - name: Install
        run: brew install --build-from-source zubeidhendricks/toad/toac

      - name: Test
        run: brew test zubeidhendricks/toad/toac
